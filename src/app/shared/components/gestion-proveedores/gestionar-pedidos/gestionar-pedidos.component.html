<ng-container>
  <!-- Encabezado del Modal - Estilo consistente con el login -->
  <div class="modal-header">
    <h2 mat-dialog-title class="modal-title">
      <mat-icon class="icon-primary">local_shipping</mat-icon>
      <span class="title-text">Pedidos a Proveedores</span>
    </h2>
    <button mat-icon-button class="close-btn" mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Contenido del Modal - Misma funcionalidad, mejor diseño -->
  <mat-dialog-content>
    <!-- Tabla de pedidos - Estructura original pero con mejor estilo -->
    <div class="table-container mat-elevation-z4">
      <table mat-table [dataSource]="dataSource" class="pedidos-table">
        <!-- Columna Fecha - Misma data pero mejor presentación -->
        <ng-container matColumnDef="fecha">
          <th mat-header-cell *matHeaderCellDef class="header-cell">Fecha</th>
          <td mat-cell *matCellDef="let pedido" class="data-cell">
            {{ pedido.fecha | date }}
          </td>
        </ng-container>

        <!-- Columna Proveedor - Misma data -->
        <ng-container matColumnDef="proveedor">
          <th mat-header-cell *matHeaderCellDef class="header-cell">Proveedor</th>
          <td mat-cell *matCellDef="let pedido" class="data-cell">
            {{ pedido.proveedor.nombre }}
          </td>
        </ng-container>

        <!-- Columna Solicitante - ✨ CORREGIDO: Usamos el campo plano solicitanteNombre -->
        <ng-container matColumnDef="solicitante">
          <th mat-header-cell *matHeaderCellDef class="header-cell">Solicitante</th>
          <td mat-cell *matCellDef="let pedido" class="data-cell">
            {{ pedido.solicitanteNombre }}
          </td>
        </ng-container>

        <!-- Columna Acciones - Funcionalidad IDÉNTICA -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="header-cell acciones-header">Acciones</th>
          <td mat-cell *matCellDef="let pedido" class="data-cell acciones-cell">
            <!-- Botón Ver (misma función) -->
            <button mat-icon-button 
                    color="primary" 
                    (click)="verDetalle(pedido)"
                    matTooltip="Ver detalle">
              <mat-icon>visibility</mat-icon>
            </button>

            <!-- Botón Editar (✨ CORREGIDO: Usamos solicitanteId para la condición) -->
            <button mat-icon-button 
                    color="accent" 
                    *ngIf="pedido.solicitanteId === usuarioId"
                    (click)="abrirModalEditarPedido(pedido)"
                    matTooltip="Editar pedido">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Mismas definiciones de filas -->
        <tr mat-header-row *matHeaderRowDef="columnas" class="header-row"></tr>
        <tr mat-row *matRowDef="let row; columns: columnas;" class="data-row"></tr>
      </table>
    </div>
  </mat-dialog-content>

  <!-- Acciones del Modal - Mismas funciones -->
  <mat-dialog-actions align="end" class="modal-actions">
    <!-- Botón Nuevo Pedido (misma función) -->
    <button mat-raised-button 
            color="primary" 
            (click)="abrirModalNuevoPedido()"
            class="action-btn">
      <mat-icon>add</mat-icon> Nuevo Pedido
    </button>

    <!-- Botón Cerrar (misma función) -->
    <button mat-button 
            mat-dialog-close
            class="action-btn">
      Cerrar
    </button>
  </mat-dialog-actions>
</ng-container>
