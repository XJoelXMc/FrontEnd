<div class="dialog-header">
  <h2 mat-dialog-title>
    <mat-icon>photo_library</mat-icon>
    Imágenes de: {{ data.nombreMolde }}
  </h2>
  <button mat-icon-button (click)="closeDialog()" class="close-button">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="gallery-content">
  <div class="gallery-grid">
    <div *ngFor="let imagen of data.imagenes" class="gallery-item">
      <img [src]="imagen" [alt]="data.nombreMolde">
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="closeDialog()">Cerrar</button>
</mat-dialog-actions>
